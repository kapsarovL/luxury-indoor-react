version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    ignore:
      - dependency-name: 'js-yaml'
        versions: ['<4.2.0']
      - dependency-name: '@babel/core'
        versions: ['<7.29.6']

  - package-ecosystem: 'npm'
    directory: '/server'
    schedule:
      interval: 'weekly'
    ignore:
      - dependency-name: 'js-yaml'
        versions: ['<4.2.0']
      - dependency-name: 'qs'
        versions: ['<6.15.2']
      - dependency-name: '@babel/core'
        versions: ['<7.29.6']
